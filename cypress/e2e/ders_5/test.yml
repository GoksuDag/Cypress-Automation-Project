config:
  target: "https://jsonplaceholder.typicode.com"
  phases:
    - duration: 30
      arrivalRate: 2
      rampTo: 10
      name: "Yuk Testi"
  payload:
    path: "data.csv"
    fields:
      - "title"
      - "body"
      - "userId"
    order: "sequence"
  ensure:
    thresholds:
      - "http.response_time.p95": 1000
      - "http.response_time.p99": 1500
scenarios:
  - name: "API Akisi"
    flow:
      - get:
          url: "/posts"
      - post:
          url: "/posts"
          json:
            title: "{{ title }}"
            body: "{{ body }}"
            userId: "{{ userId }}"